  <text x="60" y="55" fill="#8FA689" font-family="serif" font-size="28" font-style="italic" opacity="0.8">z</text>
  <text x="80" y="35" fill="#8FA689" font-family="serif" font-size="34" font-style="italic" opacity="0.9">z</text>
